<!DOCTYPE html>
<html>
<head>
    <title>CSS Basics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <main>
        <section>
            <h2>Box Model Example</h2>
            <p>This is a box with margin, padding, and border</p>
        </section>

        <section class="flex-container">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
        </section>

        <section>
            <h2>Form</h2>
            <form>
                <label>Name:</label>
                <input type="text">

                <label>Email:</label>
                <input type="email">

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>

    <footer>
        <p>© 2026</p>
    </footer>

</body>
</html>
