<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Event Handling Demo</h1>

        <button id="clickButton">Click Me</button>

        <input type="text" id="textInput" placeholder="Type something here">

        <select id="selectOption">
            <option value="">Choose option</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JavaScript">JavaScript</option>
        </select>

        <form id="demoForm">
            <input type="text" id="formInput" placeholder="Form input">
            <button type="submit">Submit Form</button>
        </form>

        <div id="hoverBox">Hover Over Me</div>

        <p id="output">Output will appear here</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
