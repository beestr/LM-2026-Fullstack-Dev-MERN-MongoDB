<!DOCTYPE html>
<html>
<head>
    <title>HTML Fundamentals</title>
</head>
<body>

    <header>
        <h1>Welcome to HTML Pages</h1>
    </header>

    <nav>
        <a href="https//www.google.com">Go to google</a>
    </nav>

    <main>
        <section>
            <h2>About Me</h2>
            <p>This is a paragraph about me</p>
            <br>
            <p>This is another paragraph.</p>
            <hr>
        </section>

        <article>
            <h3>My Hobbies</h3>

            <h4>Ordered List</h4>
            <ol>
                <li>Coding</li>
                <li>Reading</li>
            </ol>

            <h4>Unordered</h4>
            <ul>
                <li>Music</li>
                <li>Gaming</li>
            </ul>
        </article>

        <section>
            <h2>Contact From</h2>
            <form>
                <label>Name:</label><br>
                <input type="text"><br><br>

                <label>Email:</label><br>
                <input type="email"><br><br>

                <label>Gender:</label><br>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
                <br><br>

                <label>Hobbies:</label><br>
                <input type="checkbox"> Coding
                <input type="checkbox"> Gaming

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>

    <footer>
        <p>© 2026 My Website</p>
    </footer>


</body>
</html>
